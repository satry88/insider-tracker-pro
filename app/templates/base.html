<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{% block title %}Insider Tracker Pro{% endblock %}</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;600&family=Tajawal:wght@400;700;900&display=swap" rel="stylesheet">
<style>
:root {
  --bg:      #080c10;
  --panel:   #0d1117;
  --border:  #1e2733;
  --text:    #e2e8f0;
  --muted:   #64748b;
  --green:   #00ff88;
  --red:     #ff3355;
  --gold:    #f59e0b;
  --blue:    #38bdf8;
  --purple:  #a78bfa;
  --font:    'Tajawal', sans-serif;
  --mono:    'IBM Plex Mono', monospace;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: var(--font); min-height: 100vh; }

/* Layout */
.layout { display: flex; min-height: 100vh; }
.sidebar {
  width: 220px; background: var(--panel); border-left: 1px solid var(--border);
  padding: 24px 16px; display: flex; flex-direction: column; gap: 4px;
  position: fixed; right: 0; top: 0; bottom: 0; z-index: 100;
}
.sidebar-logo {
  font-size: 18px; font-weight: 900; color: var(--green);
  letter-spacing: -0.5px; margin-bottom: 24px; display: flex; align-items: center; gap: 8px;
}
.sidebar-logo span { font-family: var(--mono); font-size: 11px; color: var(--muted); }
.nav-link {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 12px; border-radius: 8px; color: var(--muted);
  text-decoration: none; font-size: 14px; transition: all 0.15s;
}
.nav-link:hover, .nav-link.active { background: rgba(0,255,136,0.08); color: var(--green); }
.nav-link .icon { font-size: 16px; }

.main { margin-right: 220px; padding: 32px; min-height: 100vh; }

/* Cards */
.card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px;
}
.card-title { font-size: 13px; font-weight: 700; color: var(--muted); text-transform: uppercase; letter-spacing: 1px; margin-bottom: 16px; }

/* Trade row */
.trade-row {
  display: grid; grid-template-columns: 60px 1fr 1fr 1fr 1fr 80px;
  gap: 12px; align-items: center; padding: 12px 16px;
  border-radius: 8px; margin-bottom: 4px; transition: background 0.1s;
}
.trade-row:hover { background: rgba(255,255,255,0.03); }
.trade-row.buy  { border-right: 3px solid var(--green); }
.trade-row.sell { border-right: 3px solid var(--red); }

.badge-buy  { background: rgba(0,255,136,0.12); color: var(--green); padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }
.badge-sell { background: rgba(255,51,85,0.12);  color: var(--red);   padding: 3px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }

.signal-bar {
  height: 6px; border-radius: 3px; background: var(--border);
  position: relative; overflow: hidden;
}
.signal-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--green), var(--gold)); }

/* Stats */
.stats-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 24px; }
.stat-card {
  background: var(--panel); border: 1px solid var(--border);
  border-radius: 12px; padding: 20px; text-align: center;
}
.stat-val { font-size: 28px; font-weight: 900; font-family: var(--mono); }
.stat-lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

/* Search bar */
.search-bar {
  display: flex; gap: 12px; margin-bottom: 28px;
}
.search-input {
  flex: 1; background: var(--panel); border: 1px solid var(--border);
  border-radius: 10px; padding: 12px 16px; color: var(--text);
  font-family: var(--mono); font-size: 14px; outline: none;
  transition: border-color 0.2s;
}
.search-input:focus { border-color: var(--green); }
.btn-green {
  background: var(--green); color: #000; border: none;
  padding: 12px 24px; border-radius: 10px; font-weight: 700;
  cursor: pointer; font-size: 14px; transition: opacity 0.2s;
}
.btn-green:hover { opacity: 0.85; }

/* Page header */
.page-header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 28px; }
.page-title { font-size: 24px; font-weight: 900; }
.page-sub   { font-size: 13px; color: var(--muted); margin-top: 4px; }

/* Tag */
.tag { display: inline-block; padding: 2px 10px; border-radius: 20px; font-size: 12px; font-weight: 700; }

@media(max-width: 900px) {
  .sidebar { display: none; }
  .main { margin-right: 0; padding: 16px; }
  .stats-grid { grid-template-columns: repeat(2,1fr); }
  .trade-row { grid-template-columns: 50px 1fr 1fr; }
}
</style>
</head>
<body>
<div class="layout">
  <!-- Sidebar -->
  <nav class="sidebar">
    <div class="sidebar-logo">
      🔍 Insider<br><span>TRACKER PRO</span>
    </div>
    <a href="/" class="nav-link {% if request.endpoint=='dashboard.index' %}active{% endif %}">
      <span class="icon">📡</span> آخر الصفقات
    </a>
    <a href="/leaderboard" class="nav-link {% if request.endpoint=='dashboard.leaderboard' %}active{% endif %}">
      <span class="icon">🏆</span> المتصدرون
    </a>
    <a href="/screener" class="nav-link {% if request.endpoint=='dashboard.screener' %}active{% endif %}">
      <span class="icon">🎯</span> الفلتر الذكي
    </a>
  </nav>

  <!-- Main -->
  <main class="main">
    {% block content %}{% endblock %}
  </main>
</div>
</body>
</html>
